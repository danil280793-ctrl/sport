<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя Тренировка</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .date {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
        }
        .exercise-card {
            background: #fff;
            border: 1px solid #eee;
            border-left: 5px solid #007bff;
            margin-bottom: 15px;
            padding: 15px;
            border-radius: 8px;
            transition: 0.3s;
        }
        .exercise-card.done {
            background: #d4edda;
            border-left-color: #28a745;
            opacity: 0.7;
        }
        .exercise-name {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .exercise-details {
            color: #555;
            font-size: 0.9em;
            margin-bottom: 10px;
        }
        .btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
        }
        .btn:hover {
            background-color: #0056b3;
        }
        .reset-btn {
            display: block;
            width: 100%;
            background-color: #dc3545;
            margin-top: 20px;
        }
        .reset-btn:hover {
            background-color: #a71d2a;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🏋️ Тренировка</h1>
    <div class="date" id="current-date"></div>

    <div id="workout-list">
        <!-- Сюда вставятся упражнения -->
    </div>

    <button class="btn reset-btn" onclick="resetWorkout()">Сбросить прогресс</button>
</div>

<script>
    // Список упражнений (можно редактировать)
    const exercises = [
        { name: "Приседания", sets: 3, reps: 15 },
        { name: "Отжимания", sets: 3, reps: 12 },
        { name: "Планка", sets: 3, reps: "40 сек" },
        { name: "Выпады", sets: 3, reps: "10 на ногу" },
        { name: "Скручивания", sets: 4, reps: 20 }
    ];

    // Показать дату
    const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    document.getElementById('current-date').innerText = new Date().toLocaleDateString("ru-RU", options);

    // Загрузка списка
    const listContainer = document.getElementById('workout-list');

    exercises.forEach((ex, index) => {
        const card = document.createElement('div');
        card.className = 'exercise-card';
        card.id = `ex-${index}`;
        
        // Проверяем, выполнено ли уже сегодня
        const isDone = localStorage.getItem(`ex-${index}-date`) === new Date().toDateString();
        if (isDone) card.classList.add('done');

        card.innerHTML = `
            <div class="exercise-name">${ex.name}</div>
            <div class="exercise-details">Подходы: ${ex.sets} | Повторения: ${ex.reps}</div>
            <button class="btn" onclick="markDone(${index})">${isDone ? '✅ Выполнено' : 'Отметить'}</button>
        `;
        listContainer.appendChild(card);
    });

    function markDone(index) {
        const card = document.getElementById(`ex-${index}`);
        card.classList.add('done');
        card.querySelector('button').innerText = '✅ Выполнено';
        
        // Сохраняем в память браузера, что сделано сегодня
        localStorage.setItem(`ex-${index}-date`, new Date().toDateString());
    }

    function resetWorkout() {
        if(confirm('Сбросить прогресс за сегодня?')) {
            exercises.forEach((_, index) => {
                localStorage.removeItem(`ex-${index}-date`);
            });
            location.reload();
        }
    }
</script>

</body>
</html>
