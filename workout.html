<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тренировка для ребенка</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #2563eb;
      --primary-light: #60a5fa;
      --success: #10b981;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --card: #1e293b;
        --text: #f1f5f9;
        --text-muted: #94a3b8;
        --border: #334155;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }

    /* ========== НАВИГАЦИЯ ========== */
    .top-nav {
      display: flex;
      justify-content: center;
      gap: 8px;
      background: var(--card);
      padding: 12px;
      border-radius: 16px;
      margin-bottom: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    }

    .top-nav a {
      text-decoration: none;
      color: var(--text-muted);
      font-weight: 600;
      padding: 10px 20px;
      border-radius: 10px;
      transition: all 0.2s;
      font-size: 0.95rem;
    }

    .top-nav a:hover {
      background: var(--border);
      color: var(--text);
    }

    .top-nav a.active {
      background: linear-gradient(135deg, var(--primary), #0ea5e9);
      color: white;
      box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, var(--primary), #0ea5e9);
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin-bottom: 16px;
      box-shadow: 0 10px 40px rgba(37, 99, 235, 0.3);
    }

    .header h1 {
      font-size: 2.5rem;
      background: linear-gradient(135deg, var(--primary), #0ea5e9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .header p {
      color: var(--text-muted);
      font-size: 1.1rem;
    }

    /* Progress */
    .progress-card {
      background: var(--card);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 0.9rem;
    }

    .progress-bar {
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), #0ea5e9);
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    .progress-text {
      text-align: right;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* Day Tabs */
    .tabs {
      display: flex;
      gap: 4px;
      background: var(--card);
      padding: 6px;
      border-radius: 12px;
      margin-bottom: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      overflow-x: auto;
    }

    .tab {
      flex: 1;
      min-width: 40px;
      padding: 10px 8px;
      border: none;
      background: transparent;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-muted);
      transition: all 0.2s;
      position: relative;
    }

    .tab.active {
      background: linear-gradient(135deg, var(--primary), #0ea5e9);
      color: white;
    }

    .tab.completed::after {
      content: '✓';
      position: absolute;
      top: 2px;
      right: 4px;
      font-size: 10px;
      color: var(--success);
    }

    .tab.active.completed::after {
      color: white;
    }

    /* Day Header */
    .day-header {
      background: linear-gradient(135deg, #dbeafe, #e0f2fe);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
    }

    @media (prefers-color-scheme: dark) {
      .day-header {
        background: linear-gradient(135deg, rgba(37, 99, 235, 0.2), rgba(14, 165, 233, 0.2));
      }
    }

    .day-badge {
      display: inline-block;
      background: linear-gradient(135deg, var(--primary), #0ea5e9);
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .day-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .day-desc {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 12px;
    }

    .day-progress {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 12px;
    }

    .day-progress .progress-bar {
      flex: 1;
      height: 6px;
    }

    .day-progress span {
      font-size: 0.85rem;
      font-weight: 500;
    }

    /* Exercise Card */
    .exercise {
      background: var(--card);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      transition: all 0.3s;
    }

    .exercise.completed {
      border: 2px solid var(--success);
      background: linear-gradient(135deg, rgba(16, 185, 129, 0.05), rgba(16, 185, 129, 0.02));
    }

    .exercise-header {
      display: flex;
      align-items: flex-start;
      gap: 16px;
    }

    .exercise-checkbox {
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      margin-top: 12px;
    }

    .exercise-checkbox.checked {
      background: var(--success);
      border-color: var(--success);
      color: white;
    }

    .exercise-icon {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, rgba(37, 99, 235, 0.1), rgba(14, 165, 233, 0.1));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      flex-shrink: 0;
    }

    .exercise-info {
      flex: 1;
    }

    .exercise-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .exercise.completed .exercise-title {
      text-decoration: line-through;
      opacity: 0.7;
    }

    .exercise-duration {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--border);
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .exercise-short-desc {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    /* Reset Button */
    .reset-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.8rem;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      border-radius: 4px;
      margin-top: 8px;
    }

    .reset-btn:hover {
      background: var(--border);
    }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 40px;
      padding: 20px;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .header h1 {
        font-size: 1.8rem;
      }

      .exercise-header {
        flex-wrap: wrap;
      }

      .exercise-icon {
        width: 40px;
        height: 40px;
        font-size: 22px;
      }

      .tabs {
        gap: 2px;
      }

      .tab {
        padding: 8px 4px;
        font-size: 0.75rem;
      }
      
      .top-nav a {
        padding: 8px 12px;
        font-size: 0.85rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    
    <!-- НАВИГАЦИЯ -->
    <nav class="top-nav">
      <a href="index.html">🏠 Главная</a>
      <a href="workout.html" class="active">🏋️ Тренировка</a>
      <a href="neurogymnastics.html">🧠 Нейрогимнастика</a>
    </nav>

    <!-- Header -->
    <header class="header">
      <div class="header-icon">🏋️</div>
      <h1>Спорт каждый день</h1>
      <p>Комплекс упражнений на неделю для силы и ловкости</p>
    </header>

    <!-- Week Progress -->
    <div class="progress-card">
      <div class="progress-header">
        <span>Прогресс за неделю</span>
        <span id="weekProgressText">0 / 42 упражнений</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="weekProgressBar" style="width: 0%"></div>
      </div>
      <div class="progress-text" id="weekPercent">0% выполнено</div>
    </div>

    <!-- Day Tabs -->
    <div class="tabs" id="dayTabs"></div>

    <!-- Day Content -->
    <div id="dayContent"></div>

    <!-- Footer -->
    <footer class="footer">
      <p>💪 Занимайся регулярно, чтобы стать сильнее!</p>
      <p style="margin-top: 8px; font-size: 0.75rem;">Прогресс сохраняется автоматически</p>
    </footer>
  </div>

  <script>
    // ============ DATA ============
    const weeklyData = [
      {
        id: 'monday',
        name: 'Понедельник',
        shortName: 'Пн',
        title: '🦘 Прыгучесть и ноги',
        description: 'Укрепляем мышцы ног и учимся прыгать высоко!',
        exercises: [
          { id: 'm1', name: "Прыжки на двух ногах", sets: 2, reps: "20 раз", emoji: '🦘', desc: "Прыгай на месте, мягко приземляясь на носочки." },
          { id: 'm2', name: "Приседания", sets: 2, reps: "15 раз", emoji: '🦵', desc: "Спина прямая, пятки не отрывать, как будто садишься на стул." },
          { id: 'm3', name: "Мельница", sets: 2, reps: "10 раз", emoji: '🌪️', desc: "Ноги шире плеч, касаемся левой рукой правого носка и наоборот." },
          { id: 'm4', name: "Лодочка", sets: 2, reps: "10 сек", emoji: '🚣', desc: "Лежа на животе, тянем руки и ноги вверх, покачиваемся." },
          { id: 'm5', name: "Растяжка", sets: 1, reps: "30 сек", emoji: '🤸', desc: "Наклоны к ногам, сидя на полу." }
        ]
      },
      {
        id: 'tuesday',
        name: 'Вторник',
        shortName: 'Вт',
        title: '💪 Сила рук и спины',
        description: 'Качаем руки и делаем спину ровной и сильной.',
        exercises: [
          { id: 't1', name: "Отжимания от стены", sets: 2, reps: "10 раз", emoji: '🧱', desc: "Встань у стены, отжимайся от нее руками. Спина прямая." },
          { id: 't2', name: "Супергерой", sets: 2, reps: "10 сек", emoji: '🦸', desc: "Лежа на животе, подними руки и ноги вверх, замри." },
          { id: 't3', name: "Лыжник", sets: 2, reps: "20 раз", emoji: '⛷️', desc: "Наклоны вперед, руками тянемся к пальцам ног." },
          { id: 't4', name: "Планка", sets: 2, reps: "15 сек", emoji: '🧱', desc: "Упор лежа на локтях, тело как струнка." },
          { id: 't5', name: "Растяжка", sets: 1, reps: "30 сек", emoji: '🤸', desc: "Сцепи руки в замок за спиной, потянись." }
        ]
      },
      {
        id: 'wednesday',
        name: 'Среда',
        shortName: 'Ср',
        title: '⚖️ Равновесие и пресс',
        description: 'Тренируем баланс и делаем животик крепким.',
        exercises: [
          { id: 'w1', name: "Цапля", sets: 2, reps: "15 сек", emoji: '🦩', desc: "Стой на одной ноге, вторую согни в колене. Руки в стороны." },
          { id: 'w2', name: "Велосипед", sets: 2, reps: "20 раз", emoji: '🚲', desc: "Лежа на спине крутим педали в воздухе." },
          { id: 'w3', name: "Медвежья походка", sets: 2, reps: "10 шагов", emoji: '🐻', desc: "Ходьба на четвереньках (руки и ноги прямые)." },
          { id: 'w4', name: "Ножницы", sets: 2, reps: "20 раз", emoji: '✂️', desc: "Лежа на спине, скрещиваем прямые ноги в воздухе." },
          { id: 'w5', name: "Растяжка", sets: 1, reps: "30 сек", emoji: '🤸', desc: "Сидя на пятках, потянись руками вперед по полу." }
        ]
      },
      {
        id: 'thursday',
        name: 'Четверг',
        shortName: 'Чт',
        title: '🏃 Активный отдых',
        description: 'Бегаем, прыгаем и веселимся!',
        exercises: [
          { id: 'th1', name: "Бег на месте", sets: 2, reps: "40 сек", emoji: '🏃', desc: "Бежим на месте, высоко поднимая колени." },
          { id: 'th2', name: "Прыжки Звездочка", sets: 2, reps: "15 раз", emoji: '⭐', desc: "Прыжок — руки и ноги врозь, приземление — вместе." },
          { id: 'th3', name: "Гусиный шаг", sets: 2, reps: "10 шагов", emoji: '🦆', desc: "Присесть и идти в приседе, руки на поясе." },
          { id: 'th4', name: "Кошечка", sets: 2, reps: "10 раз", emoji: '🐱', desc: "Стоя на четвереньках, выгибай и прогибай спину." },
          { id: 'th5', name: "Растяжка", sets: 1, reps: "30 сек", emoji: '🤸', desc: "Покачайся из стороны в сторону, руки над головой." }
        ]
      },
      {
        id: 'friday',
        name: 'Пятница',
        shortName: 'Пт',
        title: '🤸 Гибкость и ловкость',
        description: 'Учимся управлять своим телом.',
        exercises: [
          { id: 'f1', name: "Качели", sets: 2, reps: "15 раз", emoji: '🎢', desc: "Лежа на спине, раскачиваемся и садимся без помощи рук." },
          { id: 'f2', name: "Прыжки через скакалку", sets: 2, reps: "30 раз", emoji: '⏭️', desc: "Имитируем прыжки через скакалку (даже если её нет)." },
          { id: 'f3', name: "Боковая планка", sets: 2, reps: "10 сек", emoji: '📏', desc: "Лежа на боку, поднимись на локте, тело прямое." },
          { id: 'f4', name: "Бег с захлестом", sets: 2, reps: "20 раз", emoji: '🦵', desc: "Бег на месте, стараясь пятками достать до ягодиц." },
          { id: 'f5', name: "Растяжка", sets: 1, reps: "30 сек", emoji: '🤸', desc: "Глубокий выпад вперед, тянем бедро." }
        ]
      },
      {
        id: 'saturday',
        name: 'Суббота',
        shortName: 'Сб',
        title: '🦸 Супер-тренировка',
        description: 'Повторяем всё самое интересное!',
        exercises: [
          { id: 's1', name: "Приседания-прыжки", sets: 2, reps: "10 раз", emoji: '⚡', desc: "Присел — выпрыгнул вверх!" },
          { id: 's2', name: "Отжимания от пола", sets: 2, reps: "5-10 раз", emoji: '💪', desc: "Можно с колен, если тяжело. Стараемся!" },
          { id: 's3', name: "Ласточка", sets: 2, reps: "10 сек", emoji: '🕊️', desc: "Стоя на одной ноге, наклонись вперед, руки в стороны." },
          { id: 's4', name: "Скручивания", sets: 2, reps: "15 раз", emoji: '🔄', desc: "Лежа на спине, тянемся локтем к противоположному колену." },
          { id: 's5', name: "Растяжка", sets: 1, reps: "1 мин", emoji: '🤸', desc: "Полный комплекс растяжки для всего тела." }
        ]
      },
      {
        id: 'sunday',
        name: 'Воскресенье',
        shortName: 'Вс',
        title: '🧘 День восстановления',
        description: 'Отдыхаем, дышим и расслабляемся.',
        exercises: [
          { id: 'su1', name: "Глубокое дыхание", sets: 1, reps: "10 вдохов", emoji: '🌬️', desc: "Глубокий вдох носом, медленный выдох ртом." },
          { id: 'su2', name: "Поза ребенка", sets: 1, reps: "30 сек", emoji: '👶', desc: "Сидя на пятках, наклонись вперед, лоб на пол." },
          { id: 'su3', name: "Легкие наклоны", sets: 1, reps: "10 раз", emoji: '↔️', desc: "Плавные наклоны влево и вправо." },
          { id: 'su4', name: "Потягушки", sets: 1, reps: "5 раз", emoji: '🛌', desc: "Лежа на спине, потянись руками и ногами в разные стороны." }
        ]
      }
    ];

    // ============ STATE ============
    let activeDay = getCurrentDay();
    let completed = loadProgress();

    // ============ UTILS ============
    function getCurrentDay() {
      const days = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];
      return days[new Date().getDay()];
    }

    function loadProgress() {
      try {
        const saved = localStorage.getItem('workoutProgress');
        return saved ? JSON.parse(saved) : {};
      } catch (e) {
        return {};
      }
    }

    function saveProgress() {
      localStorage.setItem('workoutProgress', JSON.stringify(completed));
    }

    // ============ RENDER ============
    function renderTabs() {
      const tabs = document.getElementById('dayTabs');
      tabs.innerHTML = weeklyData.map(day => {
        const dayCompleted = completed[day.id] ? Object.values(completed[day.id]).filter(Boolean).length : 0;
        const isComplete = dayCompleted === day.exercises.length;
        const isActive = day.id === activeDay;
        
        return `
          <button class="tab ${isActive ? 'active' : ''} ${isComplete ? 'completed' : ''}" data-day="${day.id}">
            ${day.shortName}
          </button>
        `;
      }).join('');

      tabs.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
          activeDay = tab.dataset.day;
          renderTabs();
          renderDay();
        });
      });
    }

    function renderDay() {
      const day = weeklyData.find(d => d.id === activeDay);
      if (!day) return;

      const dayCompleted = completed[day.id] ? Object.values(completed[day.id]).filter(Boolean).length : 0;
      const progressPercent = (dayCompleted / day.exercises.length) * 100;

      const content = document.getElementById('dayContent');
      content.innerHTML = `
        <div class="day-header">
          <div class="day-badge">${day.name}</div>
          <h2 class="day-title">${day.title}</h2>
          <p class="day-desc">${day.description}</p>
          <div class="day-progress">
            <div class="progress-bar">
              <div class="progress-fill" style="width: ${progressPercent}%"></div>
            </div>
            <span>${dayCompleted} / ${day.exercises.length}</span>
          </div>
          <button class="reset-btn" onclick="resetDay()">
            🔄 Сбросить день
          </button>
        </div>
        ${day.exercises.map(ex => renderExercise(ex, day.id)).join('')}
      `;

      updateWeekProgress();
    }

    function renderExercise(ex, dayId) {
      const isCompleted = completed[dayId]?.[ex.id] || false;

      return `
        <div class="exercise ${isCompleted ? 'completed' : ''}" data-exercise="${ex.id}">
          <div class="exercise-header">
            <div class="exercise-checkbox ${isCompleted ? 'checked' : ''}" onclick="toggleExercise('${dayId}', '${ex.id}')">
              ${isCompleted ? '✓' : ''}
            </div>
            <div class="exercise-icon">${ex.emoji}</div>
            <div class="exercise-info">
              <div class="exercise-title">${ex.name}</div>
              <div class="exercise-duration">🔥 ${ex.sets} подхода × ${ex.reps}</div>
              <div class="exercise-short-desc">${ex.desc}</div>
            </div>
          </div>
        </div>
      `;
    }

    function render() {
      renderTabs();
      renderDay();
    }

    // ============ ACTIONS ============
    function toggleExercise(dayId, exId) {
      if (!completed[dayId]) completed[dayId] = {};
      completed[dayId][exId] = !completed[dayId][exId];
      saveProgress();
      render();
    }

    function resetDay() {
      if (confirm('Сбросить прогресс за этот день?')) {
        delete completed[activeDay];
        saveProgress();
        render();
      }
    }

    function updateWeekProgress() {
      const totalCompleted = Object.values(completed).reduce(
        (acc, day) => acc + Object.values(day).filter(Boolean).length, 0
      );
      const totalExercises = weeklyData.reduce((acc, day) => acc + day.exercises.length, 0);
      const percent = Math.round((totalCompleted / totalExercises) * 100);

      document.getElementById('weekProgressText').textContent = `${totalCompleted} / ${totalExercises} упражнений`;
      document.getElementById('weekProgressBar').style.width = percent + '%';
      document.getElementById('weekPercent').textContent = percent + '% выполнено';
    }

    // ============ INIT ============
    render();
  </script>
</body>
</html>
