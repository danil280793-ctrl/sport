<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тренировка для ребенка</title>
  <!-- Мета-теги для установки на экран телефона (PWA) -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#2563eb">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #2563eb;
      --primary-light: #60a5fa;
      --success: #10b981;
      --gold: #f59e0b;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --card: #1e293b;
        --text: #f1f5f9;
        --text-muted: #94a3b8;
        --border: #334155;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }

    /* ========== НАВИГАЦИЯ ========== */
    .top-nav {
      display: flex;
      justify-content: center;
      gap: 8px;
      background: var(--card);
      padding: 12px;
      border-radius: 16px;
      margin-bottom: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    }

    .top-nav a {
      text-decoration: none;
      color: var(--text-muted);
      font-weight: 600;
      padding: 10px 20px;
      border-radius: 10px;
      transition: all 0.2s;
      font-size: 0.95rem;
    }

    .top-nav a:hover {
      background: var(--border);
      color: var(--text);
    }

    .top-nav a.active {
      background: linear-gradient(135deg, var(--primary), #0ea5e9);
      color: white;
      box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, var(--primary), #0ea5e9);
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin-bottom: 16px;
      box-shadow: 0 10px 40px rgba(37, 99, 235, 0.3);
    }

    .header h1 {
      font-size: 2.5rem;
      background: linear-gradient(135deg, var(--primary), #0ea5e9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .header p {
      color: var(--text-muted);
      font-size: 1.1rem;
    }

    /* Stats Cards (Streak & Progress) */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--card);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      text-align: center;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 800;
      color: var(--primary);
    }

    .stat-label {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .streak-fire {
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    /* Achievements Section */
    .achievements-row {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
      padding: 10px;
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      overflow-x: auto;
      padding-bottom: 10px;
    }

    .achievement-badge {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
      position: relative;
      filter: grayscale(100%);
      opacity: 0.5;
      transition: all 0.3s;
    }

    .achievement-badge.unlocked {
      filter: grayscale(0%);
      opacity: 1;
      background: linear-gradient(135deg, #f59e0b, #fbbf24);
      box-shadow: 0 4px 10px rgba(245, 158, 11, 0.4);
      animation: bounceIn 0.6s;
    }

    @keyframes bounceIn {
      0% { transform: scale(0); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    .achievement-tooltip {
      visibility: hidden;
      position: absolute;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--text);
      color: var(--bg);
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 0.7rem;
      white-space: nowrap;
      z-index: 10;
    }

    .achievement-badge:hover .achievement-tooltip {
      visibility: visible;
    }

    /* Day Tabs */
    .tabs {
      display: flex;
      gap: 4px;
      background: var(--card);
      padding: 6px;
      border-radius: 12px;
      margin-bottom: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      overflow-x: auto;
    }

    .tab {
      flex: 1;
      min-width: 40px;
      padding: 10px 8px;
      border: none;
      background: transparent;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-muted);
      transition: all 0.2s;
      position: relative;
    }

    .tab.active {
      background: linear-gradient(135deg, var(--primary), #0ea5e9);
      color: white;
    }

    .tab.completed::after {
      content: '✓';
      position: absolute;
      top: 2px;
      right: 4px;
      font-size: 10px;
      color: var(--success);
    }

    .tab.active.completed::after {
      color: white;
    }

    /* Day Header */
    .day-header {
      background: linear-gradient(135deg, #dbeafe, #e0f2fe);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
    }

    @media (prefers-color-scheme: dark) {
      .day-header {
        background: linear-gradient(135deg, rgba(37, 99, 235, 0.2), rgba(14, 165, 233, 0.2));
      }
    }

    .day-badge {
      display: inline-block;
      background: linear-gradient(135deg, var(--primary), #0ea5e9);
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .day-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .day-desc {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 12px;
    }

    .day-progress {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 12px;
    }

    .progress-bar {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), #0ea5e9);
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    .day-progress span {
      font-size: 0.85rem;
      font-weight: 500;
    }

    /* Exercise Card */
    .exercise {
      background: var(--card);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      transition: all 0.3s;
    }

    .exercise.completed {
      border: 2px solid var(--success);
      background: linear-gradient(135deg, rgba(16, 185, 129, 0.05), rgba(16, 185, 129, 0.02));
    }

    .exercise-header {
      display: flex;
      align-items: flex-start;
      gap: 16px;
    }

    .exercise-checkbox {
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      margin-top: 12px;
    }

    .exercise-checkbox.checked {
      background: var(--success);
      border-color: var(--success);
      color: white;
    }

    .exercise-icon {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, rgba(37, 99, 235, 0.1), rgba(14, 165, 233, 0.1));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      flex-shrink: 0;
    }

    .exercise-info {
      flex: 1;
    }

    .exercise-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .exercise.completed .exercise-title {
      text-decoration: line-through;
      opacity: 0.7;
    }

    .exercise-duration {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--border);
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .exercise-short-desc {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    /* Reset Button */
    .reset-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.8rem;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      border-radius: 4px;
      margin-top: 8px;
    }

    .reset-btn:hover {
      background: var(--border);
    }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 40px;
      padding: 20px;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    /* Achievement Popup */
    .achievement-popup {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, var(--gold), #fbbf24);
      color: white;
      padding: 15px 25px;
      border-radius: 50px;
      font-weight: bold;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      z-index: 1000;
      display: none;
      animation: dropIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes dropIn {
      0% { top: -100px; opacity: 0; }
      100% { top: 20px; opacity: 1; }
    }

    /* Responsive */
    @media (max-width: 600px) {
      .header h1 { font-size: 1.8rem; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .exercise-header { flex-wrap: wrap; }
      .exercise-icon { width: 40px; height: 40px; font-size: 22px; }
      .tabs { gap: 2px; }
      .tab { padding: 8px 4px; font-size: 0.75rem; }
      .top-nav a { padding: 8px 12px; font-size: 0.85rem; }
    }
  </style>
</head>

    <!-- Achievements Row -->

      { id: 'five', name: 'Разгон', icon: '🚀', desc: 'Выполнить 5 упражнений', check: (state) => state.total >= 5 },
      { id: 'streak3', name: 'На волне', icon: '🏄', desc: '3 дня подряд', check: (state) => state.streak >= 3 },
      { id: 'streak7', name: 'Железная воля', icon: '🔩', desc: '7 дней подряд', check: (state) => state.streak >= 7 },
      { id: 'total50', name: 'Атлет', icon: '🏋️', desc: '50 упражнений всего', check: (state) => state.total >= 50 }
    ];

    // ============ STATE ============
    let activeDay = getCurrentDay();
    let completed = {};
    let stats = {
        streak: 0,
        lastDate: null,
        total: 0,
        unlockedAch: []
    };

    // ============ INIT STATE ============
    function loadState() {
      try {
        const saved = localStorage.getItem('workoutProgress');
        const data = saved ? JSON.parse(saved) : {};
        completed = data.completed || {};
        stats = data.stats || { streak: 0, lastDate: null, total: 0, unlockedAch: [] };
      } catch (e) {
        console.error("Error loading state", e);
      }
    }

    function saveState() {
      localStorage.setItem('workoutProgress', JSON.stringify({ completed, stats }));
    }

    // ============ UTILS ============
    function getCurrentDay() {
      const days = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];
      return days[new Date().getDay()];
    }

    function getDateStr() {
      return new Date().toDateString();
    }

    // ============ LOGIC ============
    
    // Обновление серии (Streak)
    function updateStreak() {
      const today = getDateStr();
      const last = stats.lastDate;

      if (last === today) {
        // Уже занимались сегодня, ничего не меняем
        return;
      }

      const yesterday = new Date();
      yesterday.setDate(yesterday.getDate() - 1);
      const yesterdayStr = yesterday.toDateString();

      if (last === yesterdayStr) {
        // Занимались вчера -> продолжаем серию
        stats.streak++;
      } else if (last !== today) {
        // Пропустили день или первое занятие
        stats.streak = 1;
      }

      stats.lastDate = today;
      saveState();
    }

    // Проверка достижений
    function checkAchievements() {
      let newUnlock = false;
      
      achievementsList.forEach(ach => {
        if (!stats.unlockedAch.includes(ach.id) && ach.check(stats)) {
          stats.unlockedAch.push(ach.id);
          showAchievementPopup(ach);
          newUnlock = true;
        }
      });

      if (newUnlock) {
        saveState();
        renderAchievements();
      }
    }

    function showAchievementPopup(ach) {
      const popup = document.getElementById('achievementPopup');
      popup.innerHTML = `🏆 ${ach.name} разблокировано!`;
      popup.style.display = 'block';
      
      // Скрываем через 3 секунды
      setTimeout(() => {
        popup.style.display = 'none';
      }, 3000);
    }

    // Конфетти
    function celebrate() {
      var duration = 3 * 1000;
      var animationEnd = Date.now() + duration;
      var colors = ['#bb0000', '#ffffff', '#00bb00', '#0000bb', '#ffdd00'];

      (function frame() {
        confetti({
          particleCount: 5,
          angle: 60,
          spread: 55,
          origin: { x: 0 },
          colors: colors
        });
        confetti({
          particleCount: 5,
          angle: 120,
          spread: 55,
          origin: { x: 1 },
          colors: colors
        });

        if (Date.now() < animationEnd) {
          requestAnimationFrame(frame);
        }
      }());
    }

    // ============ RENDER ============
    function renderTabs() {
      const tabs = document.getElementById('dayTabs');
      tabs.innerHTML = weeklyData.map(day => {
        const dayCompleted = completed[day.id] ? Object.values(completed[day.id]).filter(Boolean).length : 0;
        const isComplete = dayCompleted === day.exercises.length;
        const isActive = day.id === activeDay;
        
        return `
          <button class="tab ${isActive ? 'active' : ''} ${isComplete ? 'completed' : ''}" data-day="${day.id}">
            ${day.shortName}
          </button>
        `;
      }).join('');

      tabs.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
          activeDay = tab.dataset.day;
          renderTabs();
          renderDay();
        });
      });
    }

    function renderDay() {
      const day = weeklyData.find(d => d.id === activeDay);
      if (!day) return;

      const dayCompleted = completed[day.id] ? Object.values(completed[day.id]).filter(Boolean).length : 0;
      const progressPercent = (dayCompleted / day.exercises.length) * 100;

      const content = document.getElementById('dayContent');
      content.innerHTML = `
        <div class="day-header">
          <div class="day-badge">${day.name}</div>
          <h2 class="day-title">${day.title}</h2>
          <p class="day-desc">${day.description}</p>
          <div class="day-progress">
            <div class="progress-bar">
              <div class="progress-fill" style="width: ${progressPercent}%"></div>
            </div>
            <span>${dayCompleted} / ${day.exercises.length}</span>
          </div>
          <button class="reset-btn" onclick="resetDay()">
            🔄 Сбросить день
          </button>
        </div>
        ${day.exercises.map(ex => renderExercise(ex, day.id)).join('')}
      `;
    }

    function renderExercise(ex, dayId) {
      const isCompleted = completed[dayId]?.[ex.id] || false;

      return `
        <div class="exercise ${isCompleted ? 'completed' : ''}" data-exercise="${ex.id}">
          <div class="exercise-header">
            <div class="exercise-checkbox ${isCompleted ? 'checked' : ''}" onclick="toggleExercise('${dayId}', '${ex.id}')">
              ${isCompleted ? '✓' : ''}
            </div>
            <div class="exercise-icon">${ex.emoji}</div>
            <div class="exercise-info">
              <div class="exercise-title">${ex.name}</div>
              <div class="exercise-duration">🔥 ${ex.sets} подхода × ${ex.reps}</div>
              <div class="exercise-short-desc">${ex.desc}</div>
            </div>
          </div>
        </div>
      `;
    }

    function renderStats() {
        // Считаем всего выполненных
        let totalCount = 0;
        Object.values(completed).forEach(dayEx => {
            totalCount += Object.values(dayEx).filter(Boolean).length;
        });
        stats.total = totalCount;
        
        document.getElementById('streakCount').innerText = stats.streak;
        document.getElementById('totalDone').innerText = stats.total;
    }

    function renderAchievements() {
        const row = document.getElementById('achievementsRow');
        row.innerHTML = achievementsList.map(ach => {
            const isUnlocked = stats.unlockedAch.includes(ach.id);
            return `
                <div class="achievement-badge ${isUnlocked ? 'unlocked' : ''}">
                    ${ach.icon}
                    <span class="achievement-tooltip">${ach.name}</span>
                </div>
            `;
        }).join('');
    }

    function render() {
      renderStats();
      renderAchievements();
      renderTabs();
      renderDay();
    }

    // ============ ACTIONS ============
    function toggleExercise(dayId, exId) {
      if (!completed[dayId]) completed[dayId] = {};
      
      // Если уже было выполнено, снимаем галочку (минусуем прогресс)
      if (completed[dayId][exId]) {
          completed[dayId][exId] = false;
      } else {
          // Ставим галочку
          completed[dayId][exId] = true;
          
          // Обновляем серию при первом действии за день
          updateStreak();
          
          // Проверяем достижения
          stats.total++; // Временно увеличиваем для проверки
          checkAchievements();
          
          // Проверяем: если это было последнее упражнение в дне -> ЗАПУСК САЛЮТА
          const dayData = weeklyData.find(d => d.id === dayId);
          const allDone = dayData.exercises.every(ex => completed[dayId]?.[ex.id]);
          
          if (allDone) {
            celebrate();
          }
      }
      
      saveState();
      render();
    }

    function resetDay() {
      if (confirm('Сбросить прогресс за этот день?')) {
        delete completed[activeDay];
        saveState();
        render();
      }
    }

    // ============ INIT ============
    loadState();
    render();
  </script>
</body>
</html>
