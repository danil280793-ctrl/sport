<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Физическая Тренировка</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- МЕНЮ НАВИГАЦИИ -->
    <nav>
        <a href="index.html">🏠 Главная</a>
        <a href="workout.html" class="active">🏋️ Тренировка</a>
        <a href="neurogymnastics.html">🧠 Нейрогимнастика</a>
    </nav>

    <div class="container">
        <h2>🏋️ Комплекс на сегодня</h2>
        <p style="text-align: center; color: #666;" id="date-display"></p>
        <div id="workout-list"></div>
        <button class="btn btn-danger" onclick="resetWorkout()">Сбросить прогресс</button>
    </div>

    <script>
        // Настройки упражнений
        const exercises = [
            { name: "Приседания", sets: 3, reps: 15 },
            { name: "Отжимания", sets: 3, reps: 12 },
            { name: "Планка", sets: 3, reps: "40 сек" },
            { name: "Выпады", sets: 3, reps: "10 на ногу" },
            { name: "Скручивания", sets: 4, reps: 20 }
        ];

        // Показать дату
        const options = { weekday: 'long', month: 'long', day: 'numeric' };
        document.getElementById('date-display').innerText = new Date().toLocaleDateString("ru-RU", options);

        const listContainer = document.getElementById('workout-list');

        // Рендер упражнений
        exercises.forEach((ex, index) => {
            const key = `workout-${index}`; // Уникальный ключ для сохранения
            const isDone = localStorage.getItem(key) === new Date().toDateString();
            
            const card = document.createElement('div');
            card.className = 'card';
            if(isDone) card.style.borderLeft = "5px solid #28a745";

            card.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <strong>${ex.name}</strong>
                        <div style="font-size: 0.9em; color: #666;">Подходы: ${ex.sets} | ${ex.reps}</div>
                    </div>
                    <button class="btn ${isDone ? 'btn-success' : ''}" onclick="markDone(${index}, this)" style="width: auto; padding: 8px 15px;">
                        ${isDone ? '✅' : 'Выполнить'}
                    </button>
                </div>
            `;
            listContainer.appendChild(card);
        });

        function markDone(index, btn) {
            const key = `workout-${index}`;
            localStorage.setItem(key, new Date().toDateString());
            btn.innerText = '✅';
            btn.classList.add('btn-success');
            btn.parentElement.parentElement.style.borderLeft = "5px solid #28a745";
        }

        function resetWorkout() {
            if(confirm('Сбросить весь прогресс за сегодня?')) {
                exercises.forEach((_, index) => {
                    localStorage.removeItem(`workout-${index}`);
                });
                location.reload();
            }
        }
    </script>
</body>
</html>
