<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Нейрогимнастика - Упражнения для мозга</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #7c3aed;
      --primary-light: #a78bfa;
      --success: #10b981;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --card: #1e293b;
        --text: #f1f5f9;
        --text-muted: #94a3b8;
        --border: #334155;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, var(--primary), #ec4899);
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin-bottom: 16px;
      box-shadow: 0 10px 40px rgba(124, 58, 237, 0.3);
    }

    .header h1 {
      font-size: 2.5rem;
      background: linear-gradient(135deg, var(--primary), #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .header p {
      color: var(--text-muted);
      font-size: 1.1rem;
    }

    /* Progress */
    .progress-card {
      background: var(--card);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 0.9rem;
    }

    .progress-bar {
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), #ec4899);
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    .progress-text {
      text-align: right;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* Day Tabs */
    .tabs {
      display: flex;
      gap: 4px;
      background: var(--card);
      padding: 6px;
      border-radius: 12px;
      margin-bottom: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      overflow-x: auto;
    }

    .tab {
      flex: 1;
      min-width: 40px;
      padding: 10px 8px;
      border: none;
      background: transparent;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-muted);
      transition: all 0.2s;
      position: relative;
    }

    .tab.active {
      background: linear-gradient(135deg, var(--primary), #ec4899);
      color: white;
    }

    .tab.completed::after {
      content: '✓';
      position: absolute;
      top: 2px;
      right: 4px;
      font-size: 10px;
      color: var(--success);
    }

    .tab.active.completed::after {
      color: white;
    }

    /* Day Header */
    .day-header {
      background: linear-gradient(135deg, #ede9fe, #fce7f3);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
    }

    @media (prefers-color-scheme: dark) {
      .day-header {
        background: linear-gradient(135deg, rgba(124, 58, 237, 0.2), rgba(236, 72, 153, 0.2));
      }
    }

    .day-badge {
      display: inline-block;
      background: linear-gradient(135deg, var(--primary), #ec4899);
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .day-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .day-desc {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .day-progress {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 12px;
    }

    .day-progress .progress-bar {
      flex: 1;
      height: 6px;
    }

    .day-progress span {
      font-size: 0.85rem;
      font-weight: 500;
    }

    /* Exercise Card */
    .exercise {
      background: var(--card);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      transition: all 0.3s;
    }

    .exercise.completed {
      border: 2px solid var(--success);
      background: linear-gradient(135deg, rgba(16, 185, 129, 0.05), rgba(16, 185, 129, 0.02));
    }

    .exercise-header {
      display: flex;
      align-items: flex-start;
      gap: 16px;
    }

    .exercise-checkbox {
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .exercise-checkbox.checked {
      background: var(--success);
      border-color: var(--success);
      color: white;
    }

    .exercise-icon {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, rgba(124, 58, 237, 0.1), rgba(236, 72, 153, 0.1));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      flex-shrink: 0;
    }

    .exercise-info {
      flex: 1;
    }

    .exercise-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .exercise.completed .exercise-title {
      text-decoration: line-through;
      opacity: 0.7;
    }

    .exercise-duration {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--border);
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .exercise-short-desc {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    /* Timer */
    .timer {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
    }

    .timer-btn {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      transition: all 0.2s;
    }

    .timer-btn.primary {
      background: linear-gradient(135deg, var(--primary), #ec4899);
      color: white;
    }

    .timer-btn.secondary {
      background: var(--border);
      color: var(--text);
    }

    .timer-display {
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 1.2rem;
      font-weight: 600;
    }

    .timer-display.finished {
      color: var(--success);
    }

    .timer-progress {
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
    }

    .timer-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), #ec4899);
      transition: width 0.1s linear;
    }

    /* Details Toggle */
    .details-toggle {
      margin-top: 12px;
      background: none;
      border: none;
      color: var(--primary);
      cursor: pointer;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 0;
    }

    .details-toggle:hover {
      text-decoration: underline;
    }

    .details {
      margin-top: 16px;
      display: none;
    }

    .details.open {
      display: block;
    }

    .steps {
      background: rgba(124, 58, 237, 0.05);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .steps h4 {
      font-size: 0.9rem;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .step {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
    }

    .step:last-child {
      margin-bottom: 0;
    }

    .step-num {
      width: 24px;
      height: 24px;
      background: linear-gradient(135deg, var(--primary), #ec4899);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 600;
      flex-shrink: 0;
    }

    .step-content {
      flex: 1;
    }

    .step-text {
      font-size: 0.9rem;
    }

    .step-tip {
      font-size: 0.8rem;
      color: var(--primary);
      font-style: italic;
      margin-top: 4px;
    }

    .benefits {
      background: rgba(16, 185, 129, 0.1);
      border-radius: 12px;
      padding: 16px;
    }

    .benefits h4 {
      font-size: 0.9rem;
      color: var(--success);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .benefits ul {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .benefits li {
      font-size: 0.8rem;
      color: var(--success);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* Reset Button */
    .reset-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      border-radius: 4px;
    }

    .reset-btn:hover {
      background: var(--border);
    }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 40px;
      padding: 20px;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .header h1 {
        font-size: 1.8rem;
      }

      .exercise-header {
        flex-wrap: wrap;
      }

      .exercise-icon {
        width: 40px;
        height: 40px;
        font-size: 22px;
      }

      .tabs {
        gap: 2px;
      }

      .tab {
        padding: 8px 4px;
        font-size: 0.75rem;
      }
    }
  </style>
</head>

    // ============ STATE ============
    let activeDay = getCurrentDay();
    let completed = loadProgress();
    let activeTimer = null;
    let timerInterval = null;
    let timerSeconds = 0;

    // ============ UTILS ============
    function getCurrentDay() {
      const days = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];
      return days[new Date().getDay()];
    }

    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      if (mins > 0) {
        return secs > 0 ? `${mins} мин ${secs} сек` : `${mins} мин`;
      }
      return `${secs} сек`;
    }

    function loadProgress() {
      try {
        const saved = localStorage.getItem('neuroGymProgress');
        return saved ? JSON.parse(saved) : {};
      } catch (e) {
        return {};
      }
    }

    function saveProgress() {
      localStorage.setItem('neuroGymProgress', JSON.stringify(completed));
    }

    // ============ RENDER ============
    function renderTabs() {
      const tabs = document.getElementById('dayTabs');
      tabs.innerHTML = weeklyData.map(day => {
        const dayCompleted = completed[day.id] ? Object.values(completed[day.id]).filter(Boolean).length : 0;
        const isComplete = dayCompleted === day.exercises.length;
        const isActive = day.id === activeDay;
        
        return `
          <button class="tab ${isActive ? 'active' : ''} ${isComplete ? 'completed' : ''}" data-day="${day.id}">
            ${day.shortName}
          </button>
        `;
      }).join('');

      tabs.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
          activeDay = tab.dataset.day;
          stopTimer();
          renderTabs();
          renderDay();
        });
      });
    }

    function renderDay() {
      const day = weeklyData.find(d => d.id === activeDay);
      if (!day) return;

      const dayCompleted = completed[day.id] ? Object.values(completed[day.id]).filter(Boolean).length : 0;
      const progressPercent = (dayCompleted / day.exercises.length) * 100;

      const content = document.getElementById('dayContent');
      content.innerHTML = `
        <div class="day-header">
          <div class="day-badge">${day.name}</div>
          <h2 class="day-title">${day.title}</h2>
          <p class="day-desc">${day.description}</p>
          <div class="day-progress">
            <div class="progress-bar">
              <div class="progress-fill" style="width: ${progressPercent}%"></div>
            </div>
            <span>${dayCompleted} / ${day.exercises.length}</span>
          </div>
          <button class="reset-btn" onclick="resetDay()">
            🔄 Сбросить день
          </button>
        </div>
        ${day.exercises.map(ex => renderExercise(ex, day.id)).join('')}
      `;

      updateWeekProgress();
    }

    function renderExercise(ex, dayId) {
      const isCompleted = completed[dayId]?.[ex.id] || false;
      const isTimerRunning = activeTimer === ex.id;

      return `
        <div class="exercise ${isCompleted ? 'completed' : ''}" data-exercise="${ex.id}">
          <div class="exercise-header">
            <div class="exercise-checkbox ${isCompleted ? 'checked' : ''}" onclick="toggleExercise('${dayId}', '${ex.id}')">
              ${isCompleted ? '✓' : ''}
            </div>
            <div class="exercise-icon">${ex.emoji}</div>
            <div class="exercise-info">
              <div class="exercise-title">${ex.name}</div>
              <div class="exercise-duration">⏱️ ${formatTime(ex.duration)}</div>
              <div class="exercise-short-desc">${ex.shortDesc}</div>
              
              <div class="timer">
                <button class="timer-btn primary" onclick="toggleTimer('${ex.id}', ${ex.duration})">
                  ${isTimerRunning ? '⏸️ Пауза' : '▶️ Старт'}
                </button>
                <button class="timer-btn secondary" onclick="resetTimer('${ex.id}', ${ex.duration})">
                  🔄 Сброс
                </button>
                <span class="timer-display ${timerSeconds === 0 && activeTimer !== ex.id ? '' : ''}" id="timer-${ex.id}">
                  ${formatTime(isTimerRunning ? timerSeconds : ex.duration)}
                </span>
              </div>
              <div class="timer-progress">
                <div class="timer-progress-fill" id="progress-${ex.id}" style="width: ${isTimerRunning ? ((ex.duration - timerSeconds) / ex.duration * 100) : 0}%"></div>
              </div>

              <button class="details-toggle" onclick="toggleDetails('${ex.id}')">
                📖 Показать инструкцию
              </button>

              <div class="details" id="details-${ex.id}">
                <div class="steps">
                  <h4>📝 Как выполнять:</h4>
                  ${ex.steps.map((step, i) => `
                    <div class="step">
                      <div class="step-num">${i + 1}</div>
                      <div class="step-content">
                        <div class="step-text">${step.text}</div>
                        ${step.tip ? `<div class="step-tip">💡 ${step.tip}</div>` : ''}
                      </div>
                    </div>
                  `).join('')}
                </div>
                <div class="benefits">
                  <h4>✨ Чем полезно:</h4>
                  <ul>
                    ${ex.benefits.map(b => `<li>✓ ${b}</li>`).join('')}
                  </ul>
                </div>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function render() {
      renderTabs();
      renderDay();
    }

    // ============ ACTIONS ============
    function toggleExercise(dayId, exId) {
      if (!completed[dayId]) completed[dayId] = {};
      completed[dayId][exId] = !completed[dayId][exId];
      saveProgress();
      render();
    }

    function toggleDetails(exId) {
      const details = document.getElementById(`details-${exId}`);
      const btn = details.previousElementSibling;
      
      if (details.classList.contains('open')) {
        details.classList.remove('open');
        btn.textContent = '📖 Показать инструкцию';
      } else {
        details.classList.add('open');
        btn.textContent = '📖 Скрыть инструкцию';
      }
    }

    function toggleTimer(exId, duration) {
      if (activeTimer === exId) {
        stopTimer();
      } else {
        startTimer(exId, duration);
      }
    }

    function startTimer(exId, duration) {
      stopTimer();
      activeTimer = exId;
      timerSeconds = duration;
      
      timerInterval = setInterval(() => {
        timerSeconds--;
        
        const display = document.getElementById(`timer-${exId}`);
        const progress = document.getElementById(`progress-${exId}`);
        
        if (display) {
          display.textContent = formatTime(timerSeconds);
          progress.style.width = ((duration - timerSeconds) / duration * 100) + '%';
        }
        
        if (timerSeconds <= 0) {
          stopTimer();
          // Auto-complete exercise
          const day = weeklyData.find(d => d.id === activeDay);
          const ex = day?.exercises.find(e => e.id === exId);
          if (ex && !completed[activeDay]?.[exId]) {
            if (!completed[activeDay]) completed[activeDay] = {};
            completed[activeDay][exId] = true;
            saveProgress();
            render();
          }
          // Play sound or notification
          try {
            const audio = new AudioContext();
            const oscillator = audio.createOscillator();
            oscillator.connect(audio.destination);
            oscillator.frequency.value = 800;
            oscillator.start();
            setTimeout(() => oscillator.stop(), 200);
          } catch(e) {}
        }
      }, 1000);
      
      render();
    }

    function stopTimer() {
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
      activeTimer = null;
    }

    function resetTimer(exId, duration) {
      if (activeTimer === exId) {
        stopTimer();
      }
      timerSeconds = duration;
      const display = document.getElementById(`timer-${exId}`);
      const progress = document.getElementById(`progress-${exId}`);
      if (display) {
        display.textContent = formatTime(duration);
        progress.style.width = '0%';
      }
    }

    function resetDay() {
      if (confirm('Сбросить прогресс за этот день?')) {
        delete completed[activeDay];
        saveProgress();
        stopTimer();
        render();
      }
    }

    function updateWeekProgress() {
      const totalCompleted = Object.values(completed).reduce(
        (acc, day) => acc + Object.values(day).filter(Boolean).length, 0
      );
      const totalExercises = weeklyData.reduce((acc, day) => acc + day.exercises.length, 0);
      const percent = Math.round((totalCompleted / totalExercises) * 100);

      document.getElementById('weekProgressText').textContent = `${totalCompleted} / ${totalExercises} упражнений`;
      document.getElementById('weekProgressBar').style.width = percent + '%';
      document.getElementById('weekPercent').textContent = percent + '% выполнено';
    }

    // ============ INIT ============
    render();
  </script>
